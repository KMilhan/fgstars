name: Build and Test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  ubuntu-qt6:
    runs-on: ubuntu-24.04
    container:
      image: sternejaeger/kstars-ci:qt6
      options: --privileged # Some Qt/DBus tests might require privileges depending on the environment, safe default for Docker CI
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          mkdir -p kstars-build

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-qt6
      - name: Build and Test with Xvfb
        working-directory: kstars-build
        run: |
          # Install necessary display tools
          apt update && apt install -y --no-install-recommends dbus-x11 xvfb libxcb-cursor0
          
          # Setup virtual display and dbus
          export LC_ALL=C.UTF-8
          export DISPLAY=:99.0
          Xvfb :99 -screen 0 1024x768x16 &
          sleep 2
          export $(dbus-launch)
          
          # Configure CMake with the display environment captured
          cmake -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCCACHE_SUPPORT=ON \
            -DBUILD_TESTING=ON \
            -DBUILD_DOC=OFF \
            -DBUILD_WITH_QT6=ON ..
            
          # Build
          ninja -j$(nproc) all install
          
          # Run Tests in parallel
          ctest -T test -L stable -LE unstable --output-on-failure -j$(nproc)
