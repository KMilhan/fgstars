name: Validation

on:
  push:
    branches:
      - master
      - main
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  astyle-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: https://data.forgejo.org/actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install astyle
        run: |
          ASTYLE_VERSION="$(cat .astyle-version)"
          python -m pip install "astyle==${ASTYLE_VERSION}"
          astyle --version
          astyle --version | grep -q "Version ${ASTYLE_VERSION}" || {
            echo "ERROR: CI astyle version mismatch (expected ${ASTYLE_VERSION})." >&2
            exit 1
          }

      - name: Run AStyle Check
        run: |
          if [ "${{ forgejo.event_name }}" == "pull_request" ]; then
            bash tools/run_astyle.sh --check --changed-since "${{ forgejo.event.pull_request.base.sha }}"
          else
            # For pushes to main or master, check against the previous commit.
            bash tools/run_astyle.sh --check --changed-since "${{ forgejo.event.before }}"
          fi

  accessibility-check:
    runs-on: ubuntu-24.04
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: https://data.forgejo.org/actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run UI Accessibility Check
        run: |
          changed_files=()
          if [ "${{ forgejo.event_name }}" == "pull_request" ]; then
            while IFS= read -r file; do
              changed_files+=("${file}")
            done < <(git diff --name-only "${{ forgejo.event.pull_request.base.sha }}" "${{ forgejo.sha }}" | grep '\.ui$' || true)
          else
            while IFS= read -r file; do
              changed_files+=("${file}")
            done < <(git diff --name-only "${{ forgejo.event.before }}" "${{ forgejo.sha }}" | grep '\.ui$' || true)
          fi

          if [ "${#changed_files[@]}" -gt 0 ]; then
            python scripts/check_ui_accessibility.py "${changed_files[@]}"
          else
            echo "No .ui files changed."
          fi
